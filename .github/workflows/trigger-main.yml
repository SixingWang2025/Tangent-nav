name: Trigger Main Site Deploy

on:
  push:
    branches: [ main ]

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger main repo workflow
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.MAIN_REPO_PAT }}" \
            https://api.github.com/repos/SixingWang2025/SixingWang2025.github.io/dispatches \
            -d '{"event_type":"trigger-deploy"}'